<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspadinha</title>

<style>
body{font-family:Arial;background:#070b2a;color:#fff;text-align:center;padding:20px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.card{background:#222;border-radius:15px;position:relative;height:150px}
canvas{position:absolute;inset:0;width:100%;height:100%}
.fill{height:10px;background:gold;width:0%}
.bar{background:#333;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h1>Raspadinha</h1>
<p>Raspe todas, na última você ganha 🎁</p>

<div id="progress">0 / 6</div>
<div class="bar"><div id="fill" class="fill"></div></div>

<div class="cards" id="cards"></div>

<h2 id="msg"></h2>

<script>
let count=0;
let total=6;

const cards=document.getElementById("cards");
const msg=document.getElementById("msg");
const fill=document.getElementById("fill");
const progress=document.getElementById("progress");

function update(){
progress.innerText=count+" / "+total;
fill.style.width=(count/total*100)+"%";
}

function confetti(){
for(let i=0;i<50;i++){
let d=document.createElement("div");
d.style.position="fixed";
d.style.width="8px";
d.style.height="8px";
d.style.background="gold";
d.style.left=Math.random()*100+"vw";
d.style.top="-10px";
d.style.animation="fall 3s linear";
document.body.appendChild(d);
setTimeout(()=>d.remove(),3000);
}
}

for(let i=0;i<6;i++){
let card=document.createElement("div");
card.className="card";
card.innerHTML="<canvas></canvas>";
cards.appendChild(card);

let canvas=card.querySelector("canvas");
let ctx=canvas.getContext("2d");

canvas.width=150;
canvas.height=150;

ctx.fillStyle="#999";
ctx.fillRect(0,0,150,150);

let done=false;

function scratch(x,y){
ctx.globalCompositeOperation="destination-out";
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

canvas.addEventListener("mousedown",e=>{
let r=canvas.getBoundingClientRect();
scratch(e.clientX-r.left,e.clientY-r.top);
});

canvas.addEventListener("mousemove",e=>{
if(e.buttons!==1)return;
let r=canvas.getBoundingClientRect();
scratch(e.clientX-r.left,e.clientY-r.top);
});

canvas.addEventListener("mouseup",()=>{
if(done)return;
done=true;
count++;
update();

if(count===6){
msg.innerText="🎉 Você ganhou um brinde!";
confetti();
}else{
msg.innerText="Quase... continue!";
}
});

canvas.addEventListener("touchmove",e=>{
let r=canvas.getBoundingClientRect();
scratch(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);
},{passive:false});
}

update();
</script>

</body>
</html>
